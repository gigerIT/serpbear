name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_PLEASE_VERSION: "17.3.0"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      created: ${{ steps.detect_release.outputs.created }}
      tag_name: ${{ steps.detect_release.outputs.tag_name }}
      version: ${{ steps.detect_release.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Capture existing GitHub releases
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=20" > releases-before.json

      - name: Create GitHub release for merged release PRs
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: >
          npx --yes release-please@${RELEASE_PLEASE_VERSION} github-release
          --token="${GITHUB_TOKEN}"
          --repo-url="${GITHUB_REPOSITORY}"
          --target-branch="main"
          --config-file="release-please-config.json"
          --manifest-file=".release-please-manifest.json"

      - name: Capture GitHub releases after tagging
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=20" > releases-after.json

      - name: Detect newly created release
        id: detect_release
        run: |
          node <<'NODE'
          const fs = require('fs');

          const before = JSON.parse(fs.readFileSync('releases-before.json', 'utf8'));
          const after = JSON.parse(fs.readFileSync('releases-after.json', 'utf8'));
          const beforeIds = new Set(before.map((release) => release.id));
          const createdRelease = after.find((release) => !beforeIds.has(release.id) && !release.draft);
          const outputFile = process.env.GITHUB_OUTPUT;

          if (!createdRelease) {
            fs.appendFileSync(outputFile, 'created=false\n');
            fs.appendFileSync(outputFile, 'tag_name=\n');
            fs.appendFileSync(outputFile, 'version=\n');
            process.exit(0);
          }

          const tagName = createdRelease.tag_name || '';
          const versionMatch = tagName.match(/(?:^|-)v?(\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?)$/);
          const version = versionMatch ? versionMatch[1] : tagName.replace(/^v/, '');

          fs.appendFileSync(outputFile, 'created=true\n');
          fs.appendFileSync(outputFile, `tag_name=${tagName}\n`);
          fs.appendFileSync(outputFile, `version=${version}\n`);
          NODE

      - name: Create or update release PR
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: >
          npx --yes release-please@${RELEASE_PLEASE_VERSION} release-pr
          --token="${GITHUB_TOKEN}"
          --repo-url="${GITHUB_REPOSITORY}"
          --target-branch="main"
          --config-file="release-please-config.json"
          --manifest-file=".release-please-manifest.json"

  validate_release:
    if: needs.release.outputs.created == 'true'
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout released tag
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies for released tag
        run: npm ci

      - name: Lint released tag
        run: npm run lint

      - name: Test released tag
        run: npm run test:ci

      - name: Build released tag
        run: npm run build

  docker_image:
    if: needs.release.outputs.created == 'true' && needs.validate_release.result == 'success'
    needs:
      - release
      - validate_release
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout released tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag_name }}
          fetch-depth: 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare platform variables
        id: platform
        run: |
          platform_pair=$(echo "${{ matrix.platform }}" | tr '/' '-')
          echo "pair=${platform_pair}" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.DOCKERHUB_REPOSITORY }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          outputs: type=image,name=${{ vars.DOCKERHUB_REPOSITORY }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=release-${{ steps.platform.outputs.pair }}
          cache-to: type=gha,mode=max,scope=release-${{ steps.platform.outputs.pair }}
          provenance: false
          sbom: false

      - name: Export image digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ steps.platform.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish_docker_manifest:
    if: needs.release.outputs.created == 'true' && needs.docker_image.result == 'success'
    needs:
      - release
      - docker_image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download image digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Generate Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.DOCKERHUB_REPOSITORY }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.version }}
            type=raw,value=latest

      - name: Create and push Docker manifest
        working-directory: /tmp/digests
        env:
          IMAGE_NAME: ${{ vars.DOCKERHUB_REPOSITORY }}
          TAGS: ${{ steps.docker_meta.outputs.tags }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          digests=(*)
          if [ ${#digests[@]} -eq 0 ]; then
            echo "No image digests were downloaded." >&2
            exit 1
          fi

          tag_args=()
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              tag_args+=("-t" "$tag")
            fi
          done <<< "$TAGS"

          digest_refs=()
          for digest in "${digests[@]}"; do
            digest_refs+=("${IMAGE_NAME}@sha256:${digest}")
          done

          docker buildx imagetools create "${tag_args[@]}" "${digest_refs[@]}"

      - name: Inspect published manifest
        run: docker buildx imagetools inspect "${{ vars.DOCKERHUB_REPOSITORY }}:${{ needs.release.outputs.version }}"
